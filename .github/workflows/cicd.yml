name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths-ignore:
      - "k8s/**"
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Docker Hub image namespace (your Docker Hub username or org)
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
  FRONTEND_IMAGE: full-stack-chatapp-frontend
  BACKEND_IMAGE: full-stack-chatapp-backend

jobs:
  secret_scan_and_lint:
    name: Secret Scanning & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        with:
          # Gitleaks needs commit history to evaluate the diff range.
          # Without enough history (shallow clone), the commit range can be "unknown revision".
          fetch-depth: 0

      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend deps
        if: ${{ hashFiles('frontend/package-lock.json') != '' }}
        run: npm ci --prefix frontend

      - name: Install backend deps
        if: ${{ hashFiles('backend/package-lock.json') != '' }}
        run: npm ci --prefix backend --omit=dev

      - name: Lint (frontend)
        run: |
          if [ -f frontend/package.json ]; then
            npm run -s lint --prefix frontend
          fi

  static_code_quality:
    name: Static Code Quality Analysis (CodeQL)
    runs-on: ubuntu-latest
    needs: [secret_scan_and_lint]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  docker_meta:
    name: Docker metadata
    runs-on: ubuntu-latest
    needs: [static_code_quality]
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      should_push: ${{ steps.meta.outputs.should_push }}
    permissions:
      contents: read
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            echo "should_push=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "should_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_push=false" >> "$GITHUB_OUTPUT"
          fi

  docker_build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [docker_meta]
    permissions:
      contents: read
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (export tar)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          tags: ${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ needs.docker_meta.outputs.short_sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          outputs: type=docker,dest=/tmp/backend-image.tar

      - name: Build frontend image (export tar)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          tags: ${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ needs.docker_meta.outputs.short_sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          outputs: type=docker,dest=/tmp/frontend-image.tar

      - name: Upload built images
        uses: actions/upload-artifact@v4
        with:
          name: built-images-${{ needs.docker_meta.outputs.short_sha }}
          path: |
            /tmp/backend-image.tar
            /tmp/frontend-image.tar
          if-no-files-found: error
          retention-days: 1

  container_scanning:
    name: Container Scanning
    runs-on: ubuntu-latest
    needs: [docker_meta, docker_build]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-${{ runner.os }}-

      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: built-images-${{ needs.docker_meta.outputs.short_sha }}
          path: /tmp/images

      - name: Load backend image
        run: docker load -i /tmp/images/backend-image.tar

      - name: Load frontend image
        run: docker load -i /tmp/images/frontend-image.tar

      - name: Container scan (Trivy) - backend
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ needs.docker_meta.outputs.short_sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH

      - name: Container scan (Trivy) - frontend
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ needs.docker_meta.outputs.short_sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results (backend) to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload Trivy results (frontend) to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  docker_push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: [docker_meta, container_scanning]
    if: ${{ needs.docker_meta.outputs.should_push == 'true' && github.event_name != 'pull_request' }}
    permissions:
      contents: read
    steps:
      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: built-images-${{ needs.docker_meta.outputs.short_sha }}
          path: /tmp/images

      - name: Load backend image
        run: docker load -i /tmp/images/backend-image.tar

      - name: Load frontend image
        run: docker load -i /tmp/images/frontend-image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag images as latest
        run: |
          docker tag "${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ needs.docker_meta.outputs.short_sha }}" \
            "${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest"
          docker tag "${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ needs.docker_meta.outputs.short_sha }}" \
            "${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest"

      - name: Push backend image
        run: |
          docker push "${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ needs.docker_meta.outputs.short_sha }}"
          docker push "${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest"

      - name: Push frontend image
        run: |
          docker push "${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ needs.docker_meta.outputs.short_sha }}"
          docker push "${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest"

  update_k8s_manifests_images:
    name: Update Kubernetes Manifests (image tags)
    runs-on: ubuntu-latest
    needs: [docker_meta, docker_push]
    if: ${{ needs.docker_meta.outputs.should_push == 'true' && github.event_name != 'pull_request' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository (main)
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in k8s manifests
        env:
          SHORT_SHA: ${{ needs.docker_meta.outputs.short_sha }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
        run: |
          python3 - <<'PY'
          import os, re
          from pathlib import Path

          short_sha = os.environ["SHORT_SHA"]
          image_namespace = os.environ["IMAGE_NAMESPACE"]
          frontend_image = os.environ["FRONTEND_IMAGE"]
          backend_image = os.environ["BACKEND_IMAGE"]

          def update_image_line(path, repo_name):
              p = Path(path)
              text = p.read_text()
              new_image = f"{image_namespace}/{repo_name}:{short_sha}"
              # Replace only the exact image line for this repo name.
              pattern = re.compile(rf"^(\s*image:\s*).*(?:{re.escape(repo_name)}):[^\s]+\s*$", re.MULTILINE)

              def repl(m):
                  return f"{m.group(1)}{new_image}"

              new_text, n = pattern.subn(repl, text)
              if n == 0:
                  raise SystemExit(f"Did not find image line for {repo_name} in {path}")
              p.write_text(new_text)

          update_image_line("k8s/frontend-deployment.yaml", frontend_image)
          update_image_line("k8s/backend-deployment.yaml", backend_image)
          PY

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/frontend-deployment.yaml k8s/backend-deployment.yaml
          git commit -m "chore(ci): update k8s image tags to ${{ needs.docker_meta.outputs.short_sha }} [skip ci]"
          git push origin main

